name: 'Douban Sync Action'
description: 'Sync Douban movie marks to JSON file (New Version)'
author: 'somkanel'

inputs:
  id:
    description: 'Douban user ID'
    required: true
    default: 'somkanel'
  type:
    description: 'Type of data to sync'
    required: false
    default: 'movie'
  format:
    description: 'Output format'
    required: false
    default: 'json'
  dir:
    description: 'Output directory'
    required: false
    default: './data'
  count:
    description: 'Number of items to fetch'
    required: false
    default: '30'

runs:
  using: 'docker'
  image: 'Dockerfile'

env:
  DOUBAN_COOKIE: ${{ secrets.DOUBAN_COOKIE }}
